<template name="photos">
    <div class="row">
        <div class="col-md-2">
            <img class="img-responsive img-thumbnail popup" src="{{ image }}" data-image="{{ image }}">
        </div>
        <div class="col-md-10">
            <h3>{{ name }}</h3>

            <p>{{ description }}</p>
            <small>{{createdAt}}</small>
        </div>
    </div>
    <hr>
</template>
